<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Slideshow App</title>
    <link rel="stylesheet" href="{{url_for('static', filename='home.css')}}">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>  
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style>
        .image-selection-container {
            display: none;
            margin-top: 30px;
        }

        .image-selection-container.show {
            display: block;
        }

        .image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .image-item {
            position: relative;
            width: 120px;
            height: 120px;
            background-color: #16213e;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #0066cc;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .image-item:hover {
            border-color: #FF6B35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.4);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-item input[type="checkbox"] {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .image-item.selected {
            border-color: #FF6B35;
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.8);
        }

        .delete-image-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: rgba(211, 47, 47, 0.9);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            transition: background-color 0.3s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-image-btn:hover {
            background-color: rgba(211, 47, 47, 1);
            transform: scale(1.1);
        }

        .audio-selection {
            text-align: center;
            margin: 20px 0;
            color: white;
        }

        .audio-selection select {
            padding: 10px 15px;
            margin: 0 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .slideshow-buttons {
            text-align: center;
            margin: 20px 0;
        }

        .slideshow-buttons button {
            padding: 12px 30px;
            margin: 0 10px;
            font-size: 16px;
            background-color: #FF6B35;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: myfont;
            transition: background-color 0.3s;
        }

        .slideshow-buttons button:hover {
            background-color: #e55a28;
        }

        .slideshow-buttons button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .selection-info {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 15px 0;
            font-family: myfont;
        }

        .select-all-btn {
            padding: 8px 15px;
            margin: 10px;
            font-size: 14px;
            background-color: #04 0c67;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: myfont;
        }

        .select-all-btn:hover {
            background-color: #0a1b5e;
        }

        .no-images-message {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 30px 0;
            font-family: myfont;
        }
    </style>
</head>
<body>
    <a href="/logout" style="margin-top: 0%;margin-left: 0%;"><button class="button" style="font-family: myfont;"><span>Logout</span></button></a>
    <div class="anim"></div>
    
    <div id="drop-area">
        <h1 style="font-family: myfont;">Drag & Drop Images Here</h1>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="files[]" id="fileElem" multiple accept="image/*" onchange="handleFiles(this.files)">
            <button class="button" type="submit">Upload</button>
        </form>
        <label class="button" for="fileElem" style="font-family: myfont;">Select Images</label>
    </div>
    
    <div id="gallery"></div>
    
    <!-- Image Selection Section -->
    <div class="image-selection-container" id="imageSelectionContainer">
        <hr style="width: 70%; padding: 3px; background-color: rgb(4, 12, 103); border-radius: 29px; border: 2px rgb(4, 12, 103);">
        <h1 style="font-size: 30px; text-align: center; color: white; font-family: myfont;">Select Images for Slideshow</h1>
        
        <div style="text-align: center;">
            <button type="button" class="select-all-btn" onclick="selectAllImages()">Select All</button>
            <button type="button" class="select-all-btn" onclick="deselectAllImages()">Deselect All</button>
        </div>
        
        <div class="image-grid" id="imageGrid"></div>
        
        <div class="selection-info">
            <span id="selectedCount">0</span> images selected
        </div>

        <div class="audio-selection">
            <label for="audioSelect" style="font-size: 18px; font-family: myfont;">Choose Audio:</label>
            <select id="audioSelect">
                <option value="chipichipi.mp3">🎵 Chipi Chipi</option>
                <option value="tom_scream.mp3">🎵 Tom Scream</option>
                <option value="sample.mp3">🎵 Sample</option>
            </select>
        </div>

        <form action="/play_slideshow" method="POST" style="display: inline;">
            <input type="hidden" id="selectedImagesInput" name="selected_images[]" multiple>
            <input type="hidden" id="audioChoiceInput" name="audio_choice">
            
            <div class="slideshow-buttons">
                <button type="button" onclick="prepareAndPlaySlideshow()" id="playBtn" disabled>
                    ▶ Play Slideshow
                </button>
            </div>
        </form>

        <div id="noImagesMsg" class="no-images-message" style="display: none;">
            No uploaded images yet. Upload images to create a slideshow!
        </div>
    </div>

    <script src="{{url_for('static', filename='drag_and_drop.js')}}"></script>
    <script>
        let allImages = [];
        let selectedImageIds = new Set();

        // Load uploaded images on page load
        async function loadUploadedImages() {
            try {
                const response = await fetch('/get_images');
                const data = await response.json();
                
                if (data.images && data.images.length > 0) {
                    allImages = data.images;
                    renderImageSelection();
                    document.getElementById('imageSelectionContainer').classList.add('show');
                    document.getElementById('noImagesMsg').style.display = 'none';
                } else {
                    document.getElementById('imageSelectionContainer').classList.remove('show');
                    document.getElementById('noImagesMsg').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading images:', error);
            }
        }

        function renderImageSelection() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            
            allImages.forEach((img, index) => {
                const container = document.createElement('div');
                container.className = 'image-item';
                container.id = `img-${img.id}`;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = img.id;
                checkbox.onchange = (e) => toggleImageSelection(img.id, e.target.checked, container);
                
                const imgElement = document.createElement('img');
                imgElement.src = img.data;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'delete-image-btn';
                deleteBtn.innerHTML = '🗑';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteImage(img.id);
                };
                
                container.appendChild(checkbox);
                container.appendChild(imgElement);
                container.appendChild(deleteBtn);
                grid.appendChild(container);
            });
        }

        function deleteImage(imageId) {
            if (!confirm('Are you sure you want to delete this image?')) {
                return;
            }

            fetch(`/delete_image/${imageId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Remove from allImages array
                    allImages = allImages.filter(img => img.id !== imageId);
                    
                    // Remove from selected if it was selected
                    selectedImageIds.delete(imageId);
                    
                    // Re-render the grid
                    if (allImages.length === 0) {
                        document.getElementById('imageSelectionContainer').classList.remove('show');
                        document.getElementById('noImagesMsg').style.display = 'block';
                    } else {
                        renderImageSelection();
                        updateSelectedCount();
                    }
                    
                    alert('Image deleted successfully');
                } else {
                    alert('Failed to delete image: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error deleting image');
            });
        }

        function toggleImageSelection(imageId, isSelected, container) {
            if (isSelected) {
                selectedImageIds.add(imageId);
                container.classList.add('selected');
            } else {
                selectedImageIds.delete(imageId);
                container.classList.remove('selected');
            }
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedImageIds.size;
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('playBtn').disabled = count === 0;
            
            // Update checkbox states to properly reflect selection
            allImages.forEach(img => {
                const container = document.getElementById(`img-${img.id}`);
                if (container) {
                    const checkbox = container.querySelector('input[type="checkbox"]');
                    if (selectedImageIds.has(img.id)) {
                        container.classList.add('selected');
                        if (checkbox) checkbox.checked = true;
                    } else {
                        container.classList.remove('selected');
                        if (checkbox) checkbox.checked = false;
                    }
                }
            });
        }

        function selectAllImages() {
            allImages.forEach(img => {
                selectedImageIds.add(img.id);
                const container = document.getElementById(`img-${img.id}`);
                const checkbox = container.querySelector('input[type="checkbox"]');
                checkbox.checked = true;
                container.classList.add('selected');
            });
            updateSelectedCount();
        }

        function deselectAllImages() {
            allImages.forEach(img => {
                selectedImageIds.delete(img.id);
                const container = document.getElementById(`img-${img.id}`);
                const checkbox = container.querySelector('input[type="checkbox"]');
                checkbox.checked = false;
                container.classList.remove('selected');
            });
            updateSelectedCount();
        }

        function prepareAndPlaySlideshow() {
            if (selectedImageIds.size === 0) {
                alert('Please select at least one image');
                return;
            }

            const audioChoice = document.getElementById('audioSelect').value;
            const form = document.querySelector('form[action="/play_slideshow"]');
            
            // Clear previous values
            const hiddenInputs = form.querySelectorAll('input[name="selected_images[]"]');
            hiddenInputs.forEach(input => input.remove());
            
            // Add selected image IDs
            selectedImageIds.forEach(id => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'selected_images[]';
                input.value = id;
                form.appendChild(input);
            });
            
            // Set audio choice
            document.getElementById('audioChoiceInput').value = audioChoice;
            
            // Submit form
            form.submit();
        }

        // Load images when page loads
        window.addEventListener('load', loadUploadedImages);

        // Refresh images after upload (override the default behavior)
        const originalForm = document.querySelector('form[action="/upload"]');
        originalForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            }).then(() => {
                loadUploadedImages();
            }).catch(error => console.error('Upload error:', error));
        });
    </script>
</body>
</html>
